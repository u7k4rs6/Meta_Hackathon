name: code-review-env
version: "1.0.0"
description: "A code review environment where an AI agent spots bugs and suggests fixes in unified diffs"
entrypoint: server/app.py
tasks:
  - id: task1_easy
    difficulty: easy
    description: "Spot the bug in a single-file diff"
    grader: server/graders/grader1.py
  - id: task2_medium
    difficulty: medium
    description: "Suggest the correct fix for a pre-flagged bug"
    grader: server/graders/grader2.py
  - id: task3_hard
    difficulty: hard
    description: "Identify the primary bug in a multi-bug authentication diff"
    grader: server/graders/grader3.py
